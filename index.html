<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-image: url('study.jpeg');
      background-size: cover;
      background-position: center;
      color: white;
      text-align: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      border-radius: 10px;
    }

    .timer {
      font-size: 3rem;
      margin: 20px 0;
    }

    .controls {
      margin: 20px 0;
    }

    .controls input {
      padding: 5px;
      margin: 5px;
      width: 50px;
    }

    .controls button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 1rem;
      cursor: pointer;
    }

    .quote {
      margin-top: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Pomodoro Timer</h1>
  <div class="timer">
    <span id="time">25:00</span>
  </div>
  <div class="controls">
    <label for="work-time">Work Time (minutes):</label>
    <input type="number" id="work-time" value="25" min="1"><br>
    <label for="break-time">Break Time (minutes):</label>
    <input type="number" id="break-time" value="5" min="1"><br>
    <button id="start">Start</button><br>
    <button id="stop">Stop</button>
  </div>
  <div class="quote">
    <p id="quote-text">"Stay focused and keep going!"</p>
  </div>
</div>
<audio id="notification" src="sunset-dreams-303195.mp3"></audio>
<script>
  const timeDisplay = document.getElementById('time');
  const startButton = document.getElementById('start');
  const stopButton = document.getElementById('stop');
  const workTimeInput = document.getElementById('work-time');
  const breakTimeInput = document.getElementById('break-time');
  const quoteText = document.getElementById('quote-text');
  const notificationSound = document.getElementById('notification');

  let workTime = parseInt(workTimeInput.value) * 60;
  let breakTime = parseInt(breakTimeInput.value) * 60;
  let timer;
  let isWorkSession = true;
  let isRunning = false;

  const quotes = [
    "The only limit is the one you set yourself.",
    "Stay focused and keep going!",
    "Small steps lead to big achievements.",
    "You are capable of amazing things.",
    "Keep pushing, you're almost there!"
  ];

  function updateTimerDisplay(time) {
    const minutes = Math.floor(time / 60).toString().padStart(2, '0');
    const seconds = (time % 60).toString().padStart(2, '0');
    timeDisplay.textContent = `${minutes}:${seconds}`;
  }

  function startTimer() {
    if (isRunning) return;
    isRunning = true;
    let currentTime = isWorkSession ? workTime : breakTime;
    timer = setInterval(() => {
      currentTime--;
      updateTimerDisplay(currentTime);
      if (currentTime <= 0) {
        clearInterval(timer);
        notificationSound.play();
        if (isWorkSession) {
          isWorkSession = false;
          currentTime = breakTime;
          quoteText.textContent = quotes[Math.floor(Math.random() * quotes.length)];
          alert('Break time!');
        } else {
          stopTimer();
          alert('Session complete!');
          return;
        }
        startTimer();
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timer);
    isRunning = false;
    isWorkSession = true;
    updateTimerDisplay(workTime);
  }

  startButton.addEventListener('click', () => {
    workTime = parseInt(workTimeInput.value) * 60;
    breakTime = parseInt(breakTimeInput.value) * 60;
    updateTimerDisplay(workTime);
    startTimer();
  });

  stopButton.addEventListener('click', stopTimer);
</script>
</body>
</html>
